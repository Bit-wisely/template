<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | Robotics Club UCE</title>
    <meta name="description" content="Verify awards and workshop participation certificates.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header class="site-header static-header">
        <div class="header-container">
            <a href="index.html" class="logo-link">
                <img src="assets/images/logo.png" alt="Robotics Club Logo" class="logo-img" onerror="this.src='design/logo.png'">
            </a>
            <button class="menu-toggle" aria-label="Toggle Navigation">
                <span class="hamburger"></span>
            </button>
            <nav class="nav-panel">
                <ul class="nav-list">
                    <li><a href="index.html#about" class="nav-item">About Us</a></li>
                    <li><a href="team.html" class="nav-item">Crew</a></li>
                    <li><a href="events.html" class="nav-item">Events</a></li>
                    <li><a href="certificates.html" class="nav-item">Certificates</a></li>
                    <li><a href="suggestions.html" class="nav-item">Suggestion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="subpage-container">
        <!-- Certificates Section -->
        <main class="main-content">
            <section class="content-section certificates-section">
                <div class="section-container">
                    <div class="section-header">
                        <span class="section-tag">Verify Awards</span>
                        <h2 class="section-title">Certificates</h2>
                    </div>
                    <div class="certificates-wrapper">
                        <div class="certificate-content">
                            <p class="lead-text">Verify your participation, awards, and achievements earned in Robotics Club UCE events.</p>
                            <div class="search-box">
                                <input type="text" id="cert-id-input" placeholder="Enter Certificate ID (e.g. RC-2026-9842)" aria-label="Certificate ID">
                                <button id="cert-verify-btn" class="primary-btn">Verify Now</button>
                            </div>
                            <div id="cert-result" class="cert-result-container"></div>
                        </div>
                        <div class="certificate-mockup">
                            <img src="assets/images/cert.png" alt="Sample Certificate" class="cert-img" onerror="this.src='design/WWIQlqgmRxCCi7RQ8L4ygFmlYFc.png'">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-overlay"></div>
        <div class="footer-content">
            <div class="footer-top">
                <h2 class="footer-title">Let's build something extraordinary.</h2>
                <div class="footer-links">
                    <a href="suggestions.html" class="footer-link">Connect &rarr;</a>
                    <a href="https://www.instagram.com/roboticsclubuce/" target="_blank" class="footer-link">Instagram &rarr;</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Robotics Club, UCE.</p>
            </div>
        </div>
    </footer>

    <!-- Consolidated App Script -->
    <script src="js/app.js"></script>
</body>
</html>
